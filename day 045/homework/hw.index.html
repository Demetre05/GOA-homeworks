    <!--font-family - კუთვნილება, რომელიც საშუალებას გვაძლევს ტექსტს დამწერლობა შევუცვალოთ.
        import - არის ფუნქცია, რომელიც საშუალებას გვაძლევს კონკრეტული ფონტის მისამართი დავლინკოთ და ეს ფონტი ჩვენს CSS-ის
    დოკუმენტში ჩავაშენოთ.
        CSS-ის მდგომარეობა - გარკვეული თეგის(მაგ: ლინკი ან ღილაკი) ამჟამინდელი მდგომარეობა და მითითება, თუ რა უნდა განიცადოს
    თეგმა ამ მდგომარეობაში ყოფნისას. განვიხილოთ ლინკის მაგალითი:
            1) :link მდგომარეობა - ეს არის მდგომარეობა, როდესაც ლინკთან ჯერ არანაირი შეხება არ გვქონია.
            2) :hover მდგომარეობა - ეს არის მდგომარეობა, როდესაც ლინკს ზემოდან მაუსს გადავატარებთ.
            3) :active მდგომარეობა - ეს არის მდგომარეობა, როდესაც ლინკზე მაუსი დაჭერილი გვაქვს და ჯერ კიდე არ ავუშვით.
            4) :visited მდგომარეობა - ეს არის მდგომარეობა, როდესაც ლინკზე უკვე ერთხელ მაინც ვყოფილვართ გადასული.-->
